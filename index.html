<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>语法特工：动词迷宫</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #1a73e8; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .question { font-size: 1.2rem; margin: 20px 0; font-weight: bold; }
        input { width: 100%; padding: 10px; font-size: 1rem; border: 2px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: #1a73e8; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 15px; width: 100%; font-size: 1rem; }
        button:hover { background: #1557b0; }
        #feedback { margin-top: 20px; padding: 15px; border-radius: 5px; display: none; }
        .correct { background: #e6f4ea; color: #1e7e34; border: 1px solid #c3e6cb; }
        .wrong { background: #fce8e6; color: #d93025; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="card">
    <h2>🕵️ 语法特工：第一关</h2>
    <div id="game-area">
        <p>指令：根据动词填入正确形式 (doing/to do/do)</p>
        <div class="question" id="verb-display">正在加载...</div>
        <input type="text" id="user-input" placeholder="输入答案后按回车" autofocus>
        <button onclick="checkAnswer()">提交指令</button>
        <div id="feedback"></div>
    </div>
</div>

<script>
    // 提取自你的文档 
    const questData = [
        { v: "enjoy", a: "enjoy doing", m: "享受做某事" },
        { v: "be busy", a: "doing", m: "忙于做某事" },
        { v: "avoid", a: "doing", m: "避免做某事" },
        { v: "be worth", a: "doing", m: "做某事是值得的" },
        { v: "finish", a: "doing", m: "完成了某事" },
        { v: "suggest", a: "doing", m: "建议做某事" },
        { v: "keep", a: "doing", m: "坚持做某事" },
        { v: "mind", a: "doing", m: "介意做某事" }
    ];

    let currentIdx = 0;

    function showQuestion() {
        if(currentIdx >= questData.length) {
            document.getElementById('game-area').innerHTML = "<h3>🏆 任务完成！你已经记住了所有搭配！</h3>";
            return;
        }
        const q = questData[currentIdx];
        document.getElementById('verb-display').innerText = `关键词：${q.v} (${q.m})`;
        document.getElementById('user-input').value = "";
        document.getElementById('feedback').style.display = "none";
    }

    function checkAnswer() {
        const input = document.getElementById('user-input').value.trim().toLowerCase();
        const answer = questData[currentIdx].a;
        const feedback = document.getElementById('feedback');
        
        feedback.style.display = "block";
        if(input === answer) {
            feedback.className = "correct";
            feedback.innerText = "✅ 正确！特工等级提升！";
            currentIdx++;
            setTimeout(showQuestion, 1000); // 1秒后下一题
        } else {
            feedback.className = "wrong";
            feedback.innerText = `❌ 警报！正确搭配是 ${questData[currentIdx].v} ${answer}`;
        }
    }

    // 绑定回车键
    document.getElementById('user-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') checkAnswer();
    });

    showQuestion();
</script>
</body>
</html>
