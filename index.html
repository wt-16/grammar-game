<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>动名词(Doing)闯关实验室</title>
    <style>
        :root { --p: #4a90e2; --s: #2ecc71; --d: #e74c3c; --bg: #f8f9fa; }
        body { font-family: 'PingFang SC', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        #game-box { background: white; width: 100%; max-width: 700px; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 15px; }
        .nav-btns { display: flex; justify-content: space-between; margin-bottom: 15px; }
        button { padding: 12px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; transition: 0.2s; background: white; font-size: 1em; }
        button:hover { background: #f0f7ff; border-color: var(--p); }
        .group-btn { padding: 20px; font-size: 1.1em; font-weight: bold; color: var(--p); line-height: 1.4; }
        #display { font-size: 1.6em; margin: 25px 0; min-height: 60px; color: #333; font-weight: bold; }
        input { width: 90%; padding: 12px; font-size: 1.2em; border: 2px solid #ddd; border-radius: 8px; text-align: center; }
        .hint { color: var(--d); margin-top: 10px; font-weight: bold; min-height: 40px; }
        .report { text-align: left; background: #fff4f4; padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px solid #ffebee; }
        .preview-list { text-align: left; background: #fdfdfd; padding: 15px; border-radius: 10px; border: 1px solid #eee; margin-bottom: 20px; }
        .timer-ring { color: var(--d); font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="game-box">
    <div id="nav" class="nav-btns hidden">
        <button onclick="location.reload()">🏠 返回主页</button>
        <button onclick="showPrev()">⬅️ 上一题记录</button>
    </div>

    <div id="home">
        <h2>动名词 (Doing) 闯关实验室</h2>
        <div class="grid">
            <button class="group-btn" onclick="startGroup(0)">第一组<br>(基础必备)</button>
            <button class="group-btn" onclick="startGroup(1)">第二组<br>(常考难点)</button>
            <button class="group-btn" onclick="startGroup(2)">第三组<br>(进阶表达)</button>
            <button class="group-btn" onclick="startGroup(3)">第四组<br>(高分短句)</button>
            <button class="group-btn" onclick="startGroup(4)" style="grid-column: span 2; background: #333; color: white;">第五组：综合大练兵 (全17词)</button>
        </div>
    </div>

    <div id="preview-stage" class="hidden">
        <h3>👂 预热：黄金30秒识记</h3>
        <p>请快速记忆，<span id="timer" class="timer-ring">30</span> 秒后自动开始</p>
        <div id="preview-content" class="preview-list"></div>
        <button onclick="skipPreview()" style="background: var(--p); color: white; width: 100%;">我会了，直接开始</button>
    </div>

    <div id="stage" class="hidden">
        <h3 id="stage-title"></h3>
        <div id="display"></div>
        <div id="input-zone"></div>
        <div id="hint-msg" class="hint"></div>
        <div id="history-box" class="hidden"></div>
    </div>

    <div id="result-page" class="hidden">
        <h2>本组练习报告</h2>
        <div id="result-summary" style="font-size: 1.2em; margin-bottom: 15px;"></div>
        <div id="wrong-list" class="report"></div>
        <button onclick="location.reload()" style="margin-top:20px; width:100%; background:var(--p); color:white;">完成，回到主页</button>
    </div>
</div>

<script>
// 基于文档更新的数据
const RAW_LIST = [
    {full: "enjoy doing sth", zh: "享受做某事"},
    {full: "spend + 时间 (in) doing sth", zh: "花费时间做某事"},
    {full: "be busy doing sth", zh: "忙于做某事"},
    {full: "finish doing sth", zh: "完成了某事"},
    {full: "prevent sb doing", zh: "阻止某人做某事"},
    {full: "feel like doing", zh: "想要做某事"},
    {full: "have difficulty (in) doing sth", zh: "做某事有困难"},
    {full: "waste time doing sth", zh: "浪费时间做某事"},
    {full: "mind doing", zh: "介意做某事"},
    {full: "avoid doing", zh: "避免做某事"},
    {full: "It is no use doing", zh: "做某事是无用的"},
    {full: "keep doing", zh: "保持做某事"},
    {full: "consider doing", zh: "考虑做某事"},
    {full: "suggest doing", zh: "建议做某事"},
    {full: "practice doing sth", zh: "练习做某事"},
    {full: "No doing", zh: "禁止做某事"},
    {full: "be worth doing", zh: "做某事是值得的"}
];

const GROUPS = [
    RAW_LIST.slice(0, 5),   // 第一组
    RAW_LIST.slice(5, 10),  // 第二组
    RAW_LIST.slice(10, 15), // 第三组
    RAW_LIST.slice(15, 17), // 第四组
    [...RAW_LIST].sort(() => Math.random() - 0.5) // 第五组：综合
];

let curGrp = 0, curLvl = 1, curIdx = 0, failCount = 0, previewTimer, countdownSec = 30;
let activeData = [], wrongRecords = [], correctCount = 0;
let lastQ = "", lastA = "";

function startGroup(id) {
    curGrp = id; activeData = GROUPS[id];
    wrongRecords = []; correctCount = 0;
    document.getElementById('home').classList.add('hidden');
    document.getElementById('nav').classList.remove('hidden');
    
    // 第五组不需要预览关，直接混合考
    if(id === 4) {
        curLvl = "mixed"; skipPreview();
    } else {
        showPreview();
    }
}

function showPreview() {
    const stage = document.getElementById('preview-stage');
    stage.classList.remove('hidden');
    document.getElementById('preview-content').innerHTML = activeData.map(i => `<p>• <b>${i.full}</b> : ${i.zh}</p>`).join('');
    countdownSec = 30;
    document.getElementById('timer').innerText = countdownSec;
    previewTimer = setInterval(() => {
        countdownSec--;
        document.getElementById('timer').innerText = countdownSec;
        if(countdownSec <= 0) skipPreview();
    }, 1000);
}

function skipPreview() {
    clearInterval(previewTimer);
    document.getElementById('preview-stage').classList.add('hidden');
    document.getElementById('stage').classList.remove('hidden');
    curLvl = (curGrp === 4) ? "mixed" : 1;
    curIdx = 0;
    render();
}

function render() {
    const item = activeData[curIdx];
    const zone = document.getElementById('input-zone');
    const display = document.getElementById('display');
    const title = document.getElementById('stage-title');
    document.getElementById('hint-msg').innerHTML = "";
    failCount = 0;

    // 综合练习逻辑：随机分配考察形式
    let mode = curLvl;
    if(curLvl === "mixed") mode = Math.floor(Math.random() * 3) + 1;

    if(mode === 1) {
        title.innerText = `第一关：意义匹配`;
        display.innerText = item.full;
        renderOptions(item.zh, 'zh');
    } else if(mode === 2) {
        title.innerText = `第二关：结构辨析`;
        display.innerText = item.full.replace(/doing/g, '_____');
        renderOptions('doing', 'grammar');
    } else {
        title.innerText = `第三关：全拼写挑战`;
        display.innerText = item.zh;
        zone.innerHTML = `<input type="text" id="spell-in" placeholder="输入核心词组(符号可省)..." onkeypress="handleEnter(event)">`;
        document.getElementById('spell-in').focus();
    }
}

function renderOptions(correct, mode) {
    let opts = mode === 'zh' ? [correct] : ['doing', 'to do', 'do', 'done'];
    if(mode === 'zh') {
        while(opts.length < 4) {
            let r = RAW_LIST[Math.floor(Math.random()*RAW_LIST.length)].zh;
            if(!opts.includes(r)) opts.push(r);
        }
    }
    opts.sort(() => Math.random()-0.5);
    document.getElementById('input-zone').innerHTML = `<div class="grid">${opts.map(o => `<button onclick="check('${o}','${correct}')">${o}</button>`).join('')}</div>`;
}

function handleEnter(e) { if(e.key === 'Enter') check(e.target.value, activeData[curIdx].full); }

// 强化：忽略空格、符号、中英括号
function cleanStr(s) {
    return s.toLowerCase()
            .replace(/[\uff08]/g, "(").replace(/[\uff09]/g, ")")
            .replace(/\s+|sth|in|\+|\(|\)/g, "") // 额外过滤 sth, in, +, ( )
            .replace(/[.,\uff0c\u3002!]/g, "");
}

function check(user, target) {
    lastQ = document.getElementById('display').innerText;
    lastA = user;
    
    if(cleanStr(user) === cleanStr(target)) {
        correctCount++;
        next();
    } else {
        failCount++;
        if(failCount === 1) { // 第一次错就记录到错题本
            if(!wrongRecords.find(x => x.full === activeData[curIdx].full)) {
                wrongRecords.push(activeData[curIdx]);
            }
        }
        if(failCount >= 3) {
            document.getElementById('hint-msg').innerHTML = `正确答案：<br><span style="color:var(--s)">${target}</span><br>5秒后跳转...`;
            document.getElementById('input-zone').innerHTML = `<button onclick="next()" style="background:var(--s); color:white; width:100%">点击跳过</button>`;
            setTimeout(() => { if(failCount >= 3) next(); }, 5000);
        } else {
            document.getElementById('hint-msg').innerText = `不对哦，再试一次！(错误${failCount}/3)`;
        }
    }
}

function next() {
    failCount = 0;
    curIdx++;
    if(curIdx >= activeData.length) {
        if(curLvl !== "mixed" && curLvl < 3) { 
            curLvl++; curIdx = 0; alert("本关通过，难度升级！"); render(); 
        } else {
            showFinalReport();
        }
    } else { render(); }
}

function showFinalReport() {
    document.getElementById('stage').classList.add('hidden');
    document.getElementById('result-page').classList.remove('hidden');
    document.getElementById('result-summary').innerText = `本组共考察 ${activeData.length} 题，正确 ${correctCount} 题。`;
    
    const wList = document.getElementById('wrong-list');
    if(wrongRecords.length === 0) {
        wList.innerHTML = "🏆 太棒了！本组全对，完美掌握！";
        wList.style.background = "#e8f5e9";
    } else {
        wList.innerHTML = "<b>需要复习的错题：</b><br>" + 
            wrongRecords.map(i => `<p>❌ ${i.full} : ${i.zh}</p>`).join('');
    }
}

function showPrev() {
    if(!lastQ) return alert("暂无记录");
    alert(`【上一题回看】\n题目：${lastQ}\n你的选项/输入：${lastA}`);
}
</script>
</body>
</html>
