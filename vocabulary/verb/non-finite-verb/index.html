<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语法游戏 - 学习中心</title>
    <style>
        /* 1. 基础设置与背景 (与主面板保持一致) */
        :root {
            --primary-color: #6c5ce7; /* 综合练习颜色：紫色 */
            --secondary-color: #00cec9; /* 知识点颜色：青色 */
            --bg-color-1: #4158D0;
            --bg-color-2: #C850C0;
            --bg-color-3: #FFCC70;
            --main-font: 'Poppins', sans-serif, 'Microsoft YaHei';
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: var(--main-font);
            /* 绚丽的渐变背景 */
            background-image: linear-gradient(43deg, var(--bg-color-1) 0%, var(--bg-color-2) 46%, var(--bg-color-3) 100%);
            color: #fff;
            box-sizing: border-box;
        }

        *, *:before, *:after {
            box-sizing: inherit;
        }

        /* 2. 毛玻璃容器 (更宽一些以容纳两列) */
        .main-container {
            position: relative;
            width: 95%;
            max-width: 800px;
            padding: 50px 30px;
            border-radius: 24px;
            /* 毛玻璃效果的核心：背景模糊 */
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.15);
            text-align: center;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 3. 装饰背景球 (增加艺术感) */
        .main-container::before,
        .main-container::after {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            z-index: -1;
        }

        .main-container::before {
            top: -70px;
            left: -70px;
            background: var(--secondary-color);
            opacity: 0.4;
        }

        .main-container::after {
            bottom: -70px;
            right: -70px;
            background: var(--primary-color);
            opacity: 0.4;
        }

        /* 4. 标题与副标题样式 */
        .main-title {
            font-size: 2.8rem;
            margin: 0 0 10px 0;
            background: linear-gradient(to right, #fff, rgba(255, 255, 255, 0.7));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .main-subtitle {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 50px;
            font-weight: 300;
        }

        /* 5. 两列布局容器 (核心部分) */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            width: 100%;
            max-width: 700px;
        }

        /* 6. 单个分类区块样式 */
        .category-box {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .category-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 5px;
            text-align: left;
            padding-left: 10px;
            border-left: 5px solid;
            letter-spacing: 1px;
        }

        /* 知识点分类的标题颜色 */
        .knowledge-box .category-title {
            border-left-color: var(--secondary-color);
            color: var(--secondary-color);
        }

        /* 综合练习分类的标题颜色 */
        .practice-box .category-title {
            border-left-color: var(--primary-color);
            color: var(--primary-color);
        }

        /* 7. 现代按钮样式 (与主面板一致) */
        .game-link {
            display: block;
            text-decoration: none;
            padding: 16px 25px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            color: #fff;
            font-size: 1.05rem;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-align: left; /* 按钮文字左对齐 */
            position: relative;
        }

        /* 8. 悬停效果 (发光、缩放、增加左侧边框色) */
        .game-link:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .game-link:active {
            transform: translateY(1px);
        }

        /* 9. 不同的悬停点缀 */
        .knowledge-box .game-link:hover {
            border-left: 5px solid var(--secondary-color);
        }

        .practice-box .game-link:hover {
            border-left: 5px solid var(--primary-color);
        }

        /* 10. 页脚信息与返回主页 */
        .footer-nav {
            margin-top: 60px;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .footer-info {
            color: rgba(255, 255, 255, 0.6);
        }

        .back-home {
            color: #fff;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.2);
            transition: background 0.3s;
        }

        .back-home:hover {
            background: rgba(0, 0, 0, 0.4);
        }

    </style>
</head>
<body>

    <div class="main-container">
        <h1 class="main-title">学习中心</h1>
        <p class="main-subtitle">巩固基础，迎接挑战</p>
        
        <div class="content-grid">
            
            <div class="category-box knowledge-box">
                <div class="category-title">知识点分类</div>
                
                <a href="pages/knowledge_01.html" class="game-link">📖 名词复数规则详解</a>
                <a href="pages/knowledge_02.html" class="game-link">📖 一般现在时 VS 现在进行时</a>
                <a href="pages/knowledge_03.html" class="game-link">📖 形容词比较级最高级</a>
                <a href="pages/knowledge_04.html" class="game-link">📖 介词 in, on, at 的妙用</a>
            </div>

            <div class="category-box practice-box">
                <div class="category-title">综合练习分类</div>
                
                <a href="todo/index.html" class="game-link">🧠 TODO：初级语法小测验</a>
                <a href="doing/index.html" class="game-link">🤯 DOING：中级时态混淆集训</a>
                <a href="exercises/adv_grammer.html" class="game-link">🔥 高级语法实战通关</a>
                <a href="exercises/wrong_collection.html" class="game-link">📝 错题集自我回顾</a>
            </div>

        </div>

        <div class="footer-nav">
            <div class="footer-info">
                选择一个类别开始你的学习之旅。
            </div>
            <a href="index.html" class="back-home">⬅️ 返回主面板</a>
        </div>
    </div>

</body>
</html>
